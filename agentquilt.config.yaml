version: 1
sourceDir: agents
defaultModelTier: balanced
modelTiers:
  frontier:
    claude: claude-opus-4-8
  balanced:
    claude: claude-sonnet-4-6
  fast:
    claude: claude-haiku-4-5

targets:
  # User agents: fragments compiled into prose documentation
  - output: AGENTS.md
    include:
      - _shared
    format: markdown

  # User agent definitions (e.g., reviewer)
  - kind: agent-definitions
    agents:
      - reviewer
    platforms:
      - claude

  # Governance meta-agents (AI-assisted gate policies)
  - kind: agent-definitions
    sourceDir: .agents
    agents:
      - governance/risk-register
      - governance/security-review
      - governance/gatekeeper
      - governance/policy-compliance
      - governance/prompt-injection-test
      - governance/supply-chain-risk
      - governance/traceability
      - governance/secret-leakage-detection
    platforms:
      - claude

  # SDLC meta-agents (AI-assisted development workflow)
  - kind: agent-definitions
    sourceDir: .agents
    agents:
      - sdlc/product-discovery
      - sdlc/requirements-analyst
      - sdlc/ambiguity-detector
      - sdlc/architecture
      - sdlc/adr-writer
      - sdlc/schema-design
      - sdlc/code-review
      - sdlc/developer-experience
      - sdlc/documentation
      - sdlc/implementation-planning
    platforms:
      - claude

  # STLC meta-agents (AI-assisted testing workflow)
  - kind: agent-definitions
    sourceDir: .agents
    agents:
      - stlc/eval-designer
      - stlc/golden-file-test
      - stlc/semantic-regression
      - stlc/test-design
      - stlc/test-automation
      - stlc/regression-scope
      - stlc/qa-strategy
      - stlc/compatibility-test
      - stlc/defect-triage
      - stlc/performance-test
    platforms:
      - claude

  # Release meta-agents (AI-assisted release coordination)
  - kind: agent-definitions
    sourceDir: .agents
    agents:
      - release/release-manager
      - release/changelog
      - release/migration-guide
      - release/evidence-collector
      - release/post-release-review
      - release/versioning
    platforms:
      - claude

  # Internal meta-agents (AgentQuilt framework internal use)
  - kind: agent-definitions
    sourceDir: .agents
    agents:
      - internal/main-orchestrator
      - internal/agent-registry
      - internal/conflict-detector
      - internal/agent-behavior-reviewer
      - internal/agent-documentation
      - internal/agent-migration
      - internal/definition-architect
      - internal/instruction-block-author
      - internal/instruction-refactoring
      - internal/prompt-compiler-guardian
    platforms:
      - claude
