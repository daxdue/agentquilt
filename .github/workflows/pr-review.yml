name: pr-quality-gate

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: packages/agentquilt
        run: npm ci

      - name: TypeScript check
        working-directory: packages/agentquilt
        run: npx tsc --project tsconfig.test.json

      - name: Run tests
        working-directory: packages/agentquilt
        run: npm test -- --run

      - name: Coverage check
        working-directory: packages/agentquilt
        run: npm run coverage

      - name: Build CLI
        working-directory: packages/agentquilt
        run: npm run build

      - name: Drift check
        run: node packages/agentquilt/dist/index.js check

      - name: Post review reminder
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## PR Quality Gate

Automated checks passed:
- TypeScript typecheck: OK
- Unit tests: OK
- Coverage thresholds: OK
- Drift check: OK

For detailed code review, use Claude Code agents:
1. Open this PR in Claude Code
2. Select agents from the agents list:
   - **code-review** - Review diff for correctness and security
   - **eval-designer** - Check for regressions (if agents/ changed)
   - **security-review** - Security assessment (if high-risk files changed)

**Authority:** Agents advise; maintainer approves.`
            })

      - name: Quality gate status
        if: success()
        run: |
          echo "OK: PR Quality Gate passed"
          echo "Required checks: TypeScript, tests, coverage, drift"
          echo "Code review: Use Claude Code agents for detailed analysis"
