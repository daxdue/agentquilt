name: issue-intake

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  intake-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Validate intake fields
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const body = context.payload.issue.body || '';
            const missing = [];
            if (!/problem|Problem/i.test(body)) missing.push('Problem statement');
            if (!/owner|Owner/i.test(body)) missing.push('Owner');
            if (!/risk|Risk/i.test(body)) missing.push('Risk level');

            if (missing.length > 0) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `**Intake gate (G0): Missing required fields**\n\n${missing.map(f => `- [ ] ${f}`).join('\n')}\n\nPlease update the issue with these fields before proceeding to requirements. See [intake-gate.yaml](policies/gates/intake-gate.yaml) for the full checklist.\n\n**Authority:** Informational only -- maintainer decides whether to proceed.`
              });
            }

      - name: Post triage reminder comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Issue Intake Gate

              This issue is ready for triage. The maintainer may manually invoke Claude Code or Codex
              against this issue -- see .docs/agentic-sdlc/github-provider-handoff.md for the gh-CLI-based
              handoff steps, then run the **analyze-issue** skill/agent to assist:

              1. Bring this issue's content into a Claude Code or Codex session (gh CLI or the provider's
                 own native GitHub integration -- never a custom API layer)
              2. Invoke **analyze-issue** (Claude Code skill) or the equivalent Codex entry skill
              3. The agent can analyze and suggest:
                 - Risk level assessment
                 - Missing required fields
                 - Potential duplicates
                 - Initial acceptance criteria

              **Authority:** Agent suggests; maintainer decides.`
            })
