name: agentquilt-test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: tools/agentctl
        run: npm ci
      - name: Run tests
        working-directory: tools/agentctl
        run: npm test -- --run
