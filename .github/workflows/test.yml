name: agentquilt-test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: packages/agentquilt
        run: npm ci
      - name: Typecheck
        working-directory: packages/agentquilt
        run: npx tsc --project tsconfig.test.json
      - name: Run tests
        working-directory: packages/agentquilt
        run: npm test -- --run
      - name: Build CLI
        working-directory: packages/agentquilt
        run: npm run build
      - name: Drift check
        run: node packages/agentquilt/dist/index.js check
