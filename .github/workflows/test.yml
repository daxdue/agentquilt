name: agentquilt-test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
      - name: Install dependencies (workspace root)
        run: npm ci
      - name: Build website
        run: npm run website:build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Format check
        working-directory: packages/agentquilt-cli
        run: npx prettier --check src tests
        continue-on-error: true
      - name: Lint
        working-directory: packages/agentquilt-cli
        run: npm run lint
        continue-on-error: true
      - name: Typecheck
        working-directory: packages/agentquilt-cli
        run: npx tsc --project tsconfig.test.json
      - name: Build CLI
        working-directory: packages/agentquilt-cli
        run: npm run build
      - name: Run tests (unit, integration, golden-fixture)
        working-directory: packages/agentquilt-cli
        run: npm test -- --run
      - name: Coverage
        working-directory: packages/agentquilt-cli
        run: npm run coverage
      - name: Drift check
        run: node packages/agentquilt-cli/dist/index.js check
      - name: Pipeline agent drift check
        run: node scripts/check-pipeline-agent-drift.mjs
      - name: Package validation
        run: npm run package:check
      - name: Dependency audit
        working-directory: packages/agentquilt-cli
        run: npm audit --audit-level=high
        continue-on-error: true
  node18:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "18"
      - name: Install dependencies (workspace root)
        run: npm ci
      - name: Build CLI on minimum supported Node
        run: npm run build
      - name: Run tests on minimum supported Node
        run: npm test

  review-reminder:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    needs: [website, test, node18]
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Post review reminder
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## PR Quality Gate

              Deterministic checks (see step results above for pass/fail):
              - Website build (packages/website, Astro): required
              - Format check: informational only, not yet blocking (no repository-wide formatting pass has been run; see .docs/agentic-sdlc/github-ci-integration.md D8/section 5.1)
              - Lint: informational only while repository-wide lint debt remains tracked
              - TypeScript typecheck: required
              - Unit / integration / golden-fixture tests: required
              - Coverage: required; thresholds enforced at 75% lines / 65% branches
              - Build: required
              - AgentQuilt drift check: required
              - Pipeline agent drift check (Claude Code vs Codex roster parity): required
              - Package validation (Codex adapter and runtime dependencies): required
              - Dependency audit (npm audit, high severity): informational only, not blocking

              For detailed review, invoke Claude Code or Codex manually per
              .docs/agentic-sdlc/github-provider-handoff.md:
              - **architecture-reviewer** - review diff for design conformance and correctness
              - **eval-designer** - check for regressions (if agent instruction sources changed)
              - **security-review** - security assessment (if high-risk files changed)

              **Authority:** Agents advise; maintainer approves. No agent or workflow merges,
              tags, or publishes.`
            })
