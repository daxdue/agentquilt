name: release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type (major, minor, patch)"
        required: true
        default: "patch"
        type: choice
        options:
          - major
          - minor
          - patch

jobs:
  release-gate-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: packages/agentquilt-cli
        run: npm ci

      - name: Run all tests
        working-directory: packages/agentquilt-cli
        run: npm test -- --run

      - name: Check coverage
        working-directory: packages/agentquilt-cli
        run: npm run coverage

      - name: Build CLI
        working-directory: packages/agentquilt-cli
        run: npm run build

      - name: Drift check
        run: node packages/agentquilt-cli/dist/index.js check

      - name: Package validation
        working-directory: packages/agentquilt-cli
        run: npm pack --dry-run

      - name: Verify risk register
        working-directory: packages/agentquilt-cli
        run: |
          node -e "
            const fs = require('fs');
            const YAML = require('yaml');
            const doc = YAML.parse(fs.readFileSync('../../policies/risks/risk-register.yaml', 'utf8'));
            const blocking = doc.risks.filter(r => r.status === 'open' && (r.level === 'high' || r.level === 'critical'));
            if (blocking.length > 0) {
              console.error('BLOCKED: open high/critical risks found: ' + blocking.map(r => r.id).join(', '));
              process.exit(1);
            }
            console.log('OK: no open high/critical risks in policies/risks/risk-register.yaml');
          "

      - name: Release readiness report
        run: |
          echo "Release Readiness Report"
          echo "========================"
          echo ""
          echo "Gate: release-gate"
          echo "Release type: ${{ github.event.inputs.release_type }}"
          echo "Current version: $(jq -r '.version' packages/agentquilt-cli/package.json)"
          echo ""
          echo "Automated checks (see step results above for pass/fail):"
          echo "  - All tests pass"
          echo "  - Drift check passes"
          echo "  - Package validation (npm pack --dry-run) passes"
          echo "  - Risk register: no open high/critical risks"
          echo ""
          echo "This report is informational only -- no step in this workflow tags, pushes,"
          echo "bumps a version, or publishes. Every one of those remains a manual step run"
          echo "by a human maintainer, per the Release Gate in .docs/sdlc/gates.md."
          echo ""
          echo "For detailed release planning, invoke Claude Code or Codex manually per"
          echo ".docs/agentic-sdlc/github-provider-handoff.md and run:"
          echo "  - release-reviewer (Claude Code / Codex agent): assembles release-readiness evidence"
          echo "  - release-readiness (Claude Code command / Codex skill): prints the Release-Readiness Summary"
          echo ""
          echo "Next: Maintainer reviews this report and the release-readiness output, then"
          echo "manually runs:"
          echo "  1. Update CHANGELOG.md if needed"
          echo "  2. npm version ${{ github.event.inputs.release_type }}"
          echo "  3. git push origin main --tags"
          echo "  4. npm publish"
