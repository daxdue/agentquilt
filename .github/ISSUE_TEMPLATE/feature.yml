name: Feature request
description: Propose new AgentQuilt capability.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a feature. This form collects the intake evidence a
        maintainer or an agentic-loop session (Claude Code / Codex, invoked manually
        per `.docs/agentic-sdlc/github-provider-handoff.md`) needs before classifying
        and planning the change.
  - type: textarea
    id: problem-statement
    attributes:
      label: Problem statement
      description: What problem does this solve? What is the current gap?
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What should AgentQuilt do once this feature exists?
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: How will we know this is done? List testable conditions.
      placeholder: |
        - [ ] `agentquilt <command>` supports ...
        - [ ] Documentation describes ...
    validations:
      required: true
  - type: textarea
    id: reproduction-evidence
    attributes:
      label: Current gap (evidence)
      description: Example of the current limitation -- a command that cannot do what you need, or a workaround you are using today.
    validations:
      required: false
  - type: dropdown
    id: risk-indicators
    attributes:
      label: Risk indicators
      description: Your best-guess risk level for this change, subject to triage.
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true
  - type: textarea
    id: compatibility-concerns
    attributes:
      label: Compatibility concerns
      description: Does this feature change CLI flags, exit codes, config format, or the manifest/block schema? Leave blank if not applicable.
    validations:
      required: false
  - type: dropdown
    id: generated-output-impact
    attributes:
      label: Generated-output impact
      description: Would this feature change AGENTS.md, CLAUDE.md, compiled agent definitions, or agentquilt.lock semantics?
      options:
        - None
        - AGENTS.md and CLAUDE.md
        - Compiled agent definitions (.claude/agents/*.md)
        - agentquilt.lock
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: documentation-impact
    attributes:
      label: Documentation impact
      description: What documentation would need to change if this is built?
      options:
        - None
        - README
        - CLAUDE.md/AGENTS.md fragments (.agentquilt/agents/project/)
        - .docs architecture or ADR
        - .docs sdlc/stlc
        - Not sure
    validations:
      required: true
  - type: textarea
    id: test-expectations
    attributes:
      label: Test expectations
      description: What test coverage would confirm this works -- new unit tests, golden-fixture additions, eval coverage, none?
    validations:
      required: true
  - type: checkboxes
    id: affected-area
    attributes:
      label: Affected area
      description: Select all that apply.
      options:
        - label: CLI
        - label: Schemas
        - label: Compiler
        - label: Adapters (Claude / AgentSkills)
        - label: Evals
        - label: Generated agents
        - label: Documentation
        - label: CI/CD
        - label: Security / Governance
