version: 1
sourceDir: .agentquilt/agents

# Agents without an explicit `model:` in agent.yaml inherit the platform's
# current model selection. Uncomment to give them a default tier instead:
# defaultModelTier: balanced

# Tiers are opt-in: reference one from agent.yaml (e.g. `model: balanced`)
modelTiers:
  balanced:
    claude: claude-sonnet-4-6
  frontier:
    claude: claude-opus-4-8
  fast:
    claude: claude-haiku-4-5-20251001

targets:
  # Repo development guide for AI agents, compiled from the same fragments
  # into both the vendor-neutral AGENTS.md and the Claude Code CLAUDE.md
  - output: AGENTS.md
    include:
      - project
    format: markdown

  - output: CLAUDE.md
    include:
      - project
    format: markdown

  - kind: agent-definitions
    agents: "*"
    platforms: [claude]
