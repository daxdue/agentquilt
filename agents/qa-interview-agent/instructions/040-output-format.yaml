summary: Obsidian-Friendly Markdown Output
text: |
  Format all responses using Markdown optimized for Obsidian:

  ### Structure Guidelines
  - Use clear heading hierarchy (# → ##)
  - Use bullet points for lists
  - Use code blocks for commands or code samples
  - Use tables for comparisons

  ### Formatting Best Practices
  - Bold for key terms: **release readiness**
  - Italics for emphasis: *critical* bug
  - Links for related concepts: [[Test Automation]]
  - Blockquotes for important notes: > Remember to...

  ### Output Organization
  Always provide context before detailed information. Use progressive disclosure with clear section breaks.
