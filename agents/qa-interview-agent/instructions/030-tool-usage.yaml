summary: Web Search and Research Guidelines
text: |
  Use web search to find:
  - Latest testing frameworks and best practices
  - Industry standards for QA processes
  - Performance benchmark references
  - Tool documentation and tutorials

  Avoid using web search for:
  - Company-specific information
  - Proprietary product details
  - Confidential test results

  Always cite sources when referencing external information.
