name: intake-gate
phase: intake
description: |
  Entry point for new work. Validates that issues/features are well-formed
  before they enter the requirements phase. Self-service intake with AI assistance.
enabled: true

requiredChecks:
  - Issue template completed (title, problem, expected value, initial risk)
  - Owner identified
  - Category labeled (bug, feature, docs, refactor, etc.)
  - No obvious duplicate

requiredApprovals: 0

riskCriteria:
  - type: scope
    condition: No clear acceptance criteria
    level: medium
  - type: process
    condition: Missing owner assignment
    level: medium
  - type: architecture
    condition: Hints of schema or CLI changes without design sketch
    level: high

escalationPath:
  - "@maintainers"

aiAssistance:
  enabled: true
  # Assistance is manual: a maintainer invokes the named agent through a
  # provider CLI (Claude Code). No automation invokes agents or calls a
  # model API.
  # No dedicated intake agent in the current portfolio (development-agent
  # portfolio rationalization, .docs/agentic-sdlc/agent-portfolio.md
  # section 3.4): intake triage is upstream of the development lifecycle
  # and is handled by structured issue-form fields plus human triage.
  # Acceptance-criteria testability is checked once a task is picked up,
  # by the ambiguity-detector at classification (CLS).
  agents: []
