mitigationProcess: |
  ## AI-Assisted Risk Management

  1. **Discovery** — requirements-agent flags issues that match risk criteria on intake. security-agent probes high-risk code changes.
  2. **Classification** — risk-agent classifies level (low/medium/high/critical) based on impact domain (architecture, security, compliance, process).
  3. **Assignment** — triage-agent suggests owner based on change area (cli-maintainers, qa-owners, etc.).
  4. **Monitoring** — risk-agent monitors all PRs; escalates if high/critical risks remain open and unmitigated.
  5. **Closure** — human decides when risk is resolved; ai-agent updates status and documents final mitigation.

escalationThreshold: "Any critical risk blocks release. Any high risk requires explicit human acceptance."
auditCycle: "Review all open risks monthly. Close mitigated risks. Promote new risks discovered in PRs."
